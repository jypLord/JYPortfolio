name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "portfolio-front/**"
      - ".github/workflows/frontend-cicd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ vars.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: cd "${{ vars.WORKING_DIRECTORY }}" && npm ci

      - name: Build app
        run: cd "${{ vars.WORKING_DIRECTORY }}" && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy static assets to S3
        run: aws s3 sync "${{ vars.WORKING_DIRECTORY }}/dist/" "s3://${{ vars.S3_BUCKET }}" --delete

      - name: Upload index.html with no-cache
        run: |
          aws s3 cp "${{ vars.WORKING_DIRECTORY }}/dist/index.html" "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
